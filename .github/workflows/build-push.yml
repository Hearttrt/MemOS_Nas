name: Phase 1 & 2 - Build and Push MemOS Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许你在 GitHub 网页端手动点击运行测试

env:
  REGISTRY: ghcr.io
  # 自动获取你的 GitHub 用户名/仓库名并转为小写 (Docker 镜像规范)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 赋予工作流向你的 GitHub Packages 写入镜像的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN 是 GitHub 自动生成和提供的，你不需要手动去 Secrets 里配置它
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 指向你刚才修改过的精简版 Dockerfile
          file: ./docker/Dockerfile 
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # 针对主流威联通 NAS 的 CPU 架构。如果是 ARM 架构 (如部分家用入门级 NAS)，请改为 linux/arm64
          platforms: linux/amd64
